# This workflow will install Python dependencies, run tests and lint with multiple versions of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install flake8, mypy, pytest, build, and wheel
      run : |
        python -m pip install --upgrade pip
        pip install build wheel
        pip install flake8 mypy pytest
    
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: | 
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
    - name: Install dependencies (Not windows)
      if: runner.os != 'Windows'
      run: |
        if [-f requirements.txt]; pip install -r requirements.txt; fi
  
    - name: Build package
      run : |
        python -m build
        pip install .
    - name: Check types with mypy
      run : |
        mypy ./src
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Test using configuration file. All are considered warnings.
        flake8 . --count --exit-zero --config .flake8 --statistics
    - name: Test with pytest
      run: |
        pytest
